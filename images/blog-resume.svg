<svg xmlns="http://www.w3.org/2000/svg"
     width="1200"
     height="210"
     viewBox="0 0 1200 210"
     role="img"
     aria-labelledby="title desc">

  <title id="title">김영진 GitHub and Blog Links</title>
  <desc id="desc">GitHub와 Blog로 이동하는 fastfetch 스타일 링크 배너</desc>

  <style>
    .terminal {
      fill: #141419;
    }

    .border {
      fill: none;
      stroke: #2b2b33;
      stroke-width: 2;
    }

    .card {
      fill: #1a1a20;
      stroke: #303039;
      stroke-width: 1.5;
    }

    .mono {
      font-family:
        "SFMono-Regular",
        "Cascadia Code",
        Consolas,
        "Liberation Mono",
        monospace;
      font-variant-ligatures: none;
    }

    .prompt {
      fill: #74d400;
      font-size: 20px;
      font-weight: 700;
    }

    .command {
      fill: #62dfbd;
      font-size: 20px;
      font-weight: 700;
    }

    .heading {
      fill: #62dfbd;
      font-size: 19px;
      font-weight: 700;
    }

    .blog-heading {
      fill: #a77bf3;
      font-size: 19px;
      font-weight: 700;
    }

    .label {
      fill: #e5ad61;
      font-size: 16px;
      font-weight: 700;
    }

    .value {
      fill: #d8d7df;
      font-size: 16px;
    }

    .muted {
      fill: #92909c;
      font-size: 14px;
    }

    .github-arrow {
      fill: #62dfbd;
      font-size: 34px;
      font-weight: 700;
    }

    .blog-arrow {
      fill: #a77bf3;
      font-size: 34px;
      font-weight: 700;
    }

    .green { fill: #62dfbd; }
    .amber { fill: #e5ad61; }
    .red { fill: #ef6666; }
    .purple { fill: #a77bf3; }
    .blue { fill: #62b8e8; }
  </style>

  <!-- background -->
  <rect class="terminal"
        width="1200"
        height="210"
        rx="12"/>

  <rect class="border"
        x="1"
        y="1"
        width="1198"
        height="208"
        rx="11"/>

  <!-- terminal command -->
  <text class="mono prompt"
        x="30"
        y="40">❯</text>

  <text class="mono command"
        x="58"
        y="40">open --links youngjin</text>

  <!-- GitHub card -->
  <g>
    <rect class="card"
          x="30"
          y="65"
          width="555"
          height="115"
          rx="10"/>

    <text class="mono heading"
          x="60"
          y="100">GitHub</text>

    <text class="mono"
          x="60"
          y="130">
      <tspan class="label">Profile:</tspan>
      <tspan class="value"
             x="150">github.com/a38027928</tspan>
    </text>

    <text class="mono muted"
          x="60"
          y="157">
      Repositories · Projects · Backend Experiments
    </text>

    <text class="mono github-arrow"
          x="520"
          y="135">→</text>
  </g>

  <!-- Blog card -->
  <g>
    <rect class="card"
          x="615"
          y="65"
          width="555"
          height="115"
          rx="10"/>

    <text class="mono blog-heading"
          x="645"
          y="100">Blog</text>

    <text class="mono"
          x="645"
          y="130">
      <tspan class="label">Posts:</tspan>
      <tspan class="value"
             x="730">your-blog-url.com</tspan>
    </text>

    <text class="mono muted"
          x="645"
          y="157">
      Java · Spring · Architecture · Troubleshooting
    </text>

    <text class="mono blog-arrow"
          x="1105"
          y="135">→</text>
  </g>

  <!-- color palette -->
  <circle cx="1020" cy="195" r="4" class="green"/>
  <circle cx="1040" cy="195" r="4" class="amber"/>
  <circle cx="1060" cy="195" r="4" class="red"/>
  <circle cx="1080" cy="195" r="4" class="purple"/>
  <circle cx="1100" cy="195" r="4" class="blue"/>

</svg>
