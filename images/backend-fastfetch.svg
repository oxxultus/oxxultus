<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">김영진 Backend Developer fastfetch profile</title>
  <desc id="desc">첨부 아바타의 명암을 문자 밀도로 변환한 컬러 ASCII 아트와 Java 백엔드 기술 스택</desc>

  <style>
    .terminal { fill: #141419; }
    .mono {
      font-family: "SFMono-Regular", "Cascadia Code", Consolas, "Liberation Mono", monospace;
      font-size: 17px;
      font-weight: 500;
      font-variant-ligatures: none;
      white-space: pre;
    }
    .prompt { fill: #74d400; font-weight: 700; }
    .command { fill: #62dfbd; }
    .heading { fill: #62dfbd; font-size: 20px; font-weight: 700; }
    .rule, .value { fill: #d8d7df; }
    .label { fill: #e5ad61; font-weight: 700; }
    .muted { fill: #92909c; }
    .green { fill: #62dfbd; }
    .amber { fill: #e5ad61; }
    .red { fill: #ef6666; }
    .purple { fill: #a77bf3; }
    .blue { fill: #62b8e8; }
    .art { font-size: 16px; }
  </style>

  <rect class="terminal" width="1200" height="560" rx="12"/>

  <text class="mono prompt" x="32" y="35">❯</text>
  <text class="mono command" x="58" y="35">fastfetch --profile youngjin</text>

  <g class="mono art" aria-label="Headphone avatar ASCII art generated from the supplied image">
    <text class="green" x="54" y="78">               :=++++=:</text>
    <text class="green" x="54" y="97">             =***++++***=</text>
    <text class="green" x="54" y="116">            ++-=+*##*+=-+*.</text>
    <text class="green" x="54" y="135">           +-:*%%@@@@%%#--*</text>
    <text class="amber" x="54" y="154">          -*-#%@@%%%%@@%%=*=</text>
    <text class="amber" x="54" y="173">         :***%%%%%%%%%%%%#**-</text>
    <text class="amber" x="54" y="192">         *##%%%%%%%%%%%%%%%##</text>
    <text class="amber" x="54" y="211">         +##%%%%%%%%%%%%%%##*</text>
    <text class="red" x="54" y="230">         -#*%%@%%%%%%%%@%%##=</text>
    <text class="red" x="54" y="249">         .*+**%@@@@@@@@%#*+*.</text>
    <text class="red" x="54" y="268">             .=*%%%%%%#+:</text>
    <text class="red" x="54" y="287">                :-==-:.</text>
    <text class="purple" x="54" y="306">              .-=+***+=:</text>
    <text class="purple" x="54" y="325">            -*#%@@@@@@%%#=.</text>
    <text class="purple" x="54" y="344">          :*%@@@@%%%%%@@@%#=.</text>
    <text class="purple" x="54" y="363">         =#%@%%%%%%%%%%%%@@%*:</text>
    <text class="blue" x="54" y="382">        =%@%%%%%%%%%%%%%%%%@%#:</text>
    <text class="blue" x="54" y="401">       -%%%%%%%%%%%%%%%%%%%%%%*.</text>
    <text class="blue" x="54" y="420">      .*%%%%%%%%%%%%%%%%%%%%%%%=</text>
    <text class="blue" x="54" y="439">      -%@%%%%%%%%%%%%%%%%%%%%%%*.</text>
    <text class="blue" x="54" y="458">      .*%%%%%%%%%%%%%%%%%%%%%%%=</text>
    <text class="blue" x="54" y="477">       -#%%%%%%%%%%%%%%%%%%%%%*.</text>
    <text class="blue" x="54" y="496">         =#%%%%%%%%%%%%%%%%#=</text>
    <text class="blue" x="54" y="515">            -+*#%%%%#*+-</text>
  </g>

  <g class="mono" aria-label="Backend profile information">
    <text class="heading" x="465" y="80">youngjin@backend</text>
    <text class="rule" x="465" y="105">-----------------------------------</text>

    <text x="465" y="138"><tspan class="label">Name:</tspan><tspan class="value" x="625">김영진</tspan></text>
    <text x="465" y="168"><tspan class="label">Role:</tspan><tspan class="value" x="625">Backend Developer</tspan></text>
    <text x="465" y="198"><tspan class="label">Language:</tspan><tspan class="value" x="625">Java</tspan></text>
    <text x="465" y="228"><tspan class="label">Framework:</tspan><tspan class="value" x="625">Spring Boot · Web MVC</tspan></text>
    <text x="465" y="258"><tspan class="label">Security:</tspan><tspan class="value" x="625">Spring Security</tspan></text>
    <text x="465" y="288"><tspan class="label">Persistence:</tspan><tspan class="value" x="625">Spring Data JPA</tspan></text>
    <text x="465" y="318"><tspan class="label">Database:</tspan><tspan class="value" x="625">Oracle · PostgreSQL · MySQL</tspan></text>
    <text x="465" y="348"><tspan class="label">Cache:</tspan><tspan class="value" x="625">Redis · Spring Data Redis</tspan></text>
    <text x="465" y="378"><tspan class="label">Infra:</tspan><tspan class="value" x="625">Nginx · Kubernetes · Docker</tspan></text>
    <text x="465" y="408"><tspan class="label">OS:</tspan><tspan class="value" x="625">Linux</tspan></text>
    <text x="465" y="438"><tspan class="label">IDE:</tspan><tspan class="value" x="625">IntelliJ IDEA · VS Code</tspan></text>

    <text x="465" y="482">
      <tspan class="green">●</tspan><tspan class="amber">  ●</tspan><tspan class="red">  ●</tspan>
      <tspan class="purple">  ●</tspan><tspan class="blue">  ●</tspan><tspan class="muted">  ●  ●  ●</tspan>
    </text>
  </g>
</svg>
